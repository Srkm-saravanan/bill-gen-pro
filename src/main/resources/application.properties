
# ===============================
# APPLICATION CONFIGURATION
# ===============================
spring.application.name=billing-service
server.port=8080

# ===============================
# DATABASE CONNECTION (MySQL)
# ===============================
# Replace 'vessel_billing_db' with whatever you want to name your database
spring.datasource.url=jdbc:mysql://localhost:3306/vessel_billing_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
# We set this to 'validate' (or 'none') because Liquibase will handle our table creation!
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# LIQUIBASE
# ===============================
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# ===============================
# LOGGING (Optional but helpful for local dev)
# ===============================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG